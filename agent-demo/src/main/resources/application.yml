server:
  port: 8030
  servlet:
    context-path: /ai/agent-demo
    # 大模型对话中文乱码处理
    encoding:
      enabled: true
      force: true
      charset: utf-8

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: agent-demo

  # Mysql配置
  datasource:
    url: jdbc:mysql://localhost:3316/ai_demo?useUnicode=true&characterEncoding=utf-8&nullCatalogMeansCurrent=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    # Druid连接池配置
    druid:
      # 初始连接数
      initial-size: 10
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 获取连接等待超时的时间
      max-wait: 30000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      # 开启PSCache，并指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
  # 数据库初始化配置
  jdbc:
    init:
      mode: always  # always: 每次启动都执行 | embedded: 仅嵌入式数据库 | never: 从不执行

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 18000

  ai:
    # 阿里云百炼配置
    dashscope:
      api-key: ${qwen-api}
      base-url: https://dashscope.aliyuncs.com
      #      chat:
      #        options:
      #          model: qwen-plus
      qwen:
        model: qwen-plus
      deepseek:
        model: deepseek-v3
      # 向量化模型配置
      embedding:
        options:
          model: text-embedding-v3

    # Milvus向量库配置
    vectorstore:
      milvus:
        uri: http://localhost:19530 # Milvus默认端口
        token: root:Milvus # 默认账号密码（生产需修改）
        database-name: default # 数据库名
        collection-name: long_term_memory # 向量库集合名
        embedding-dimension: 1024 # 通义千问embedding维度
        index-type: IVF_FLAT # 索引类型
        metric-type: COSINE # 相似度计算方式（余弦）
        consistency-level: BOUNDED # 优化：使用最终一致性，提升性能
        # 项目启动时，自动创建，milvus多集合
        auto-create-collection: true
        collections:
          - long_term_memory
          - rag_document
          - customer_knowledge
          - chat_message
          - reme_long_term_memory
    # 对话记忆配置
    memory:
      short-term:
        max-messages: 10 #
      long-term:
        similarity-top-k: 6
      implementation: lettuce  # 切换到 redisson
      redis:
        key-prefix: spring_ai_long_chat_memory # 长期记忆缓存key前缀

mybatis-plus:
  mapper-locations: classpath:/mapper/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: cn.example.ai.demo.entity
  # 配置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 优化：开启二级缓存
    cache-enabled: true
    # 优化：开启延迟加载
    lazy-loading-enabled: true
    # 优化：设置默认执行器为批量执行器
    default-executor-type: BATCH
    # 优化：设置JDBC类型为NULL时的默认类型
    jdbc-type-for-null: NULL
    # 优化：开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 优化：设置超时时间（秒）
    default-statement-timeout: 30


# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    root: INFO
    cn.example: DEBUG
    io.undertow: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always