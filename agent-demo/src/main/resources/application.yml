server:
  port: 8032
  servlet:
    # 后端部署Spring AI Alibaba Studio，不能配置context-path；前端部署可以配置
    # context-path: /ai/agent-demo
    # 大模型对话中文乱码处理
    encoding:
      enabled: true
      force: true
      charset: utf-8

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: agent-demo

  # Nacos配置中心
  config:
    import:
      - optional:nacos:${spring.application.name}.yml?refresh=true
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      # 配置中心
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
      # 服务发现
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

  # Mysql配置
  datasource:
    url: jdbc:mysql://localhost:3316/ai_demo?useUnicode=true&characterEncoding=utf-8&nullCatalogMeansCurrent=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    # Druid连接池配置
    druid:
      # 初始连接数
      initial-size: 10
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 获取连接等待超时的时间
      max-wait: 30000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      # 开启PSCache，并指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
  # 数据库初始化配置
  jdbc:
    init:
      mode: always  # always: 每次启动都执行 | embedded: 仅嵌入式数据库 | never: 从不执行

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 18000

  ai:
    # Studio配置
    studio:
      enabled: true
    # 阿里云百炼配置
    dashscope:
      api-key: ${qwen-api}
      base-url: https://dashscope.aliyuncs.com
#      chat:
#        options:
#          model: qwen-plus
      qwen:
        model: qwen-max
      deepseek:
        model: deepseek-v3
      # 向量化模型配置
      embedding:
        options:
          model: text-embedding-v3
    # A2A配置
    alibaba:
      a2a:
        enabled: true
        nacos:
          server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
          discovery:
            enabled: true
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: data_analysis_agent
            description: 专门用于数据分析和统计计算的本地智能体
            provider:
              name: data_analysis_agent
              organization: Example Inc.
              url: https://localhost:8032

mybatis-plus:
  mapper-locations: classpath:/mapper/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: cn.example.ai.demo.entity
  # 配置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 优化：开启二级缓存
    cache-enabled: true
    # 优化：开启延迟加载
    lazy-loading-enabled: true
    # 优化：设置默认执行器为批量执行器
    default-executor-type: BATCH
    # 优化：设置JDBC类型为NULL时的默认类型
    jdbc-type-for-null: NULL
    # 优化：开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 优化：设置超时时间（秒）
    default-statement-timeout: 30

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    root: INFO
    cn.example: DEBUG
    io.undertow: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always