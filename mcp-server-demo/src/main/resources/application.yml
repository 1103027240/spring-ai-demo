server:
  port: 8031
  servlet:
    context-path: /api/mcp-server-demo
    # 大模型对话中文乱码处理
    encoding:
      enabled: true
      force: true
      charset: utf-8

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: mcp-server-demo
  ai:
   # mcp server配置
    mcp:
      server:
        enabled: true
        type: async
        name: mcp-server-demo
        version: 1.0.0

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
