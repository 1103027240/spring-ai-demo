# ==================== 知识库搜索性能优化配置 ====================
# 针对千万级/亿级数据量的滚动分页性能优化

# ==================== 数据集大小配置 ====================
# small: 小数据集（< 100万），topK最大200
# medium: 中等数据集（100万-1000万），topK最大500
# large: 大数据集（> 1000万），topK最大1000
app:
  knowledge:
    dataset-size: large  # 根据实际数据量调整

# ==================== 向量搜索缓存配置 ====================
# 启用向量搜索缓存可以显著减少重复查询的响应时间
# 建议在大数据集场景下启用
app:
  knowledge:
    vector-cache:
      enabled: true  # 是否启用向量搜索缓存
      ttl: 3600    # 缓存有效期（秒），建议30-60分钟

# ==================== 相似度阈值配置 ====================
# 降低阈值可以增加匹配结果，但会增加查询时间
# 大数据集建议使用较低的阈值，减少查询次数
app:
  knowledge:
    similarity-threshold: 0.6  # 建议0.6-0.7

# ==================== Redis配置 ====================
# 用于存储分页路径和缓存，建议使用集群模式
spring:
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200      # 大数据集需要更大的连接池
          max-idle: 50
          min-idle: 10
          max-wait: 3000ms

# ==================== 数据库配置 ====================
# 确保数据库连接池足够大
spring:
  datasource:
    hikari:
      maximum-pool-size: 100    # 大数据集建议100+
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000

# ==================== 分页路径管理配置 ====================
# 分页路径在Redis中的TTL，建议设置为1-2小时
# 超过此时间用户需要重新开始查询
pagination:
  path:
    ttl: 7200  # 2小时

# ==================== 批量查询配置 ====================
# 数据库批量查询大小，建议设置为50-100
batch:
  query:
    size: 100

# ==================== 性能监控配置 ====================
# 启用性能监控和日志
logging:
  level:
    cn.getech.base.demo.service.impl.KnowledgeDocumentServiceImpl: INFO

