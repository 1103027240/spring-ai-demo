server:
  port: 8030
  servlet:
    context-path: /api/base-demo
    # 大模型对话中文乱码处理
    encoding:
      enabled: true
      force: true
      charset: utf-8

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: base-demo

  # Mysql配置
  datasource:
    url: jdbc:mysql://localhost:3316/ai_demo?useUnicode=true&characterEncoding=utf-8&nullCatalogMeansCurrent=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    # Druid连接池配置
    druid:
      # 初始连接数
      initial-size: 10
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 获取连接等待超时的时间
      max-wait: 30000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      # 开启PSCache，并指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall,slf4j
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=1000
  # 数据库初始化配置
  jdbc:
    init:
      mode: always  # always: 每次启动都执行 | embedded: 仅嵌入式数据库 | never: 从不执行

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 18000

  ai:
    # 阿里云百炼配置
    dashscope:
      api-key: ${qwen-api}
      base-url: https://dashscope.aliyuncs.com
#      chat:
#        options:
#          model: qwen-max
      qwen:
        model: qwen-max
      deepseek:
        model: deepseek-v3
      # 向量化模型配置
      embedding:
        options:
          model: text-embedding-v3

    # Milvus向量库配置
    vectorstore:
      milvus:
        uri: http://localhost:19530 # Milvus默认端口
        token: root:Milvus # 默认账号密码（生产需修改）
        database-name: default # 数据库名
        collection-name: long_term_memory # 向量库集合名
        embedding-dimension: 1024 # 通义千问embedding维度
        index-type: IVF_FLAT # 索引类型
        metric-type: COSINE # 相似度计算方式（余弦）
        consistency-level: BOUNDED # 优化：使用最终一致性，提升性能
        # 项目启动时，自动创建，milvus多集合
        auto-create-collection: true
        collections:
          - long_term_memory
          - rag_document
          - customer_knowledge
          - chat_message
          - reme_long_term_memory
    # 对话记忆配置
    memory:
      short-term:
        max-messages: 10 #
      long-term:
        similarity-top-k: 6
      implementation: lettuce  # 切换到 redisson
      redis:
        key-prefix: spring_ai_long_chat_memory # 长期记忆缓存key前缀

    # MCP客户端配置
#    mcp:
#      client:
#        enabled: true
#        request-timeout: 300s
#        toolcallback:
#          enabled: true
#        stdio:
#          servers-configuration: classpath:/mcp-server.json

mybatis-plus:
  mapper-locations: classpath:/mapper/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: cn.example.base.demo.entity
  # 配置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 优化：开启二级缓存
    cache-enabled: true
    # 优化：开启延迟加载
    lazy-loading-enabled: true
    # 优化：设置默认执行器为批量执行器
    default-executor-type: BATCH
    # 优化：设置JDBC类型为NULL时的默认类型
    jdbc-type-for-null: NULL
    # 优化：开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 优化：设置超时时间（秒）
    default-statement-timeout: 30

# Mivlus向量库最简单配置
milvus:
  client:
    uri: http://localhost:19530
    database-name: default
    connect-timeout-ms: 10000
    rpc-timeout-ms: 30000

# Qdrant向量库配置
qdrant:
  host: localhost
  port: 6333
  # 禁用gRPC，使用REST API
  use-grpc: false
  # 集合名称
  collection-name: reme_long_term_memory
  # 向量维度
  vector-dim: 1024
  # 相似度算法
  distance: Cosine
  # 关闭版本检查，消除警告
  check-compatibility: false
  # 请求超时时间
  timeout: 30000

# Agentscope连接ReMe长期记忆配置
reme:
  long-term-memory:
    api-base-url: http://localhost:8002
    timeout-seconds: 60

# Studio OpenTelemetry配置
otel:
  exporter:
    otlp:
      endpoint: http://localhost:3000
      timeout: 180s
  sdk:
    autoconfigure:
      enabled: true

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    root: INFO
    cn.example: DEBUG
    io.undertow: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

customer:
  knowledge:
    similarity-threshold: 0.7
  milvus:
    search:
      nprobe: 128

sync:
  mysql:
    retention:
      count: 20

export:
  task:
    ttl-minutes: 30
    ttl-days: 7
    base-path: E:/Export
    temp-path: E:/Export/temp

# 文本分割配置（用于 RAG 文档处理）
rag:
  text-splitting:
    # 文本分割器默认算法
    default-strategy: recursive
    # Token 分割配置
    token:
      chunk-size: 1000           # 块大小
      min-chunk-size: 20         # 最小块大小
      min-chunk-length: 50       # 最小块长度
      max-num-chunks: 1          # 最大块数
      keep-separator: true       # 是否保留分隔符
    # 递归字符分割配置
    recursive:
      pattern: 
        - "\n\n"
        - "\n"
        - ". "
        - "。"
        - "! "
        - "！"
        - "? "
        - "？"
        - "; "
        - ", "
        - "，"
        - " "
        - ""
      chunk-size: 1000           # 块大小
    # 句子分割配置
    sentence:
      chunk-size: 1000           # 块大小
    # 段落分割配置
    paragraph:
      pattern: "\\r?\\n\\s*\\r?\\n"  # 支持不同平台的换行符
      chunk-size: 1200           # 块大小
      chunk-overlap: 250         # 块重叠量
    # 字符分割配置
    character:
      chunk-size: 1000           # 块大小
      chunk-overlap: 200         # 块重叠量
      preserve-words: true       # 是否尽量保持单词完整
    # Markdown 分割配置
    markdown:
      pattern: '(?=^#{1,6}\s)|(?=^.+\n=+)|(?=^.+\n-+)|(?=^```)|(?=^>)|(?=^\d+\.)|(?=^\-)|(?=^\*)'  # Markdown 匹配正则
      chunk-size: 1000           # 块大小
      chunk-overlap: 200         # 块重叠量
    # HTML 分割配置
    html:
      pattern: '(?=<(?!\!|\/)[^>]+>)|(?<=>)|(?=<!$$CDATA\[)|(?<=$$\]>)'  # HTML 匹配正则，排除注释标签
      chunk-size: 1200           # 块大小
      chunk-overlap: 250         # 块重叠量
    # JSON 分割配置
    json:
      pattern: '(?=\{|$$)|(?<=\}|$$)'  # JSON 匹配正则，同时匹配对象和数组边界
    # 中文分割配置
    chinese:
      pattern: '(?<=[。！？；：])|(?<=[，])(?=\\s)'
      chunk-size: 1000           # 块大小
      chunk-overlap: 200         # 块重叠量
    # 代码分割配置
    code:
      pattern: '(?=\\n\\s*def\\s)|(?=\\n\\s*class\\s)|(?=\\n\\s*function\\s)|(?=\\n\\s*const\\s\\w+\\s*=)|(?=\\n\\s*let\\s\\w+\\s*=)|(?=\\n\\s*var\\s\\w+\\s*=)|(?=\\n\\s*public\\s+\\w+\\s+\\w+\\s*\\())|(?=\\n\\s*private\\s+\\w+\\s+\\w+\\s*\\())|(?=\\n\\s*protected\\s+\\w+\\s+\\w+\\s*\\())'
      chunk-size: 1500           # 块大小
      chunk-overlap: 300         # 块重叠量