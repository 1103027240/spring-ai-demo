spring:
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: default  # 可选：命名空间ID
        group: DEFAULT_GROUP
        username: nacos  # 如果启用认证
        password: nacos  # 如果启用认证
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: default  # 与服务发现命名空间一致
        group: DEFAULT_GROUP